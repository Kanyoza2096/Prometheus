<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- Primary meta -->
    <title>Kanyoza Systems Console</title>
    <meta name="description" content="Enterprise AI Command Console — real-time telemetry, social media orchestration, security monitoring, and AI engine management." />
    <meta name="application-name" content="Kanyoza" />
    <meta name="generator" content="Kanyoza Systems v10" />

    <!-- Theme -->
    <meta name="theme-color" content="#0A0E1A" />
    <meta name="color-scheme" content="dark" />

    <!-- PWA icons -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/jpeg" href="/icon.jpg" sizes="512x512" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.jpg" />

    <!-- Apple PWA config -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-name" content="Kanyoza" />

    <!-- Apple Splash Screens — portrait only -->

    <meta property="og:description" content="Enterprise AI Command Console — real-time telemetry, AI orchestration, and security monitoring." />
