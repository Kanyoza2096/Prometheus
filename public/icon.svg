<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="96" fill="#0A0E1A"/>
  <rect width="512" height="512" rx="96" fill="url(#bg-grad)"/>
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1f35"/>
      <stop offset="100%" stop-color="#0A0E1A"/>
    </linearGradient>
    <linearGradient id="zap-grad" x1="200" y1="80" x2="320" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="210" stroke="#4F46E5" stroke-width="6" stroke-opacity="0.25" fill="none"/>
  <circle cx="256" cy="256" r="180" stroke="#4F46E5" stroke-width="2" stroke-opacity="0.15" fill="none"/>
  <!-- Zap / lightning bolt -->
  <path filter="url(#glow)"
        d="M296 96 L176 272 L240 272 L216 416 L336 240 L272 240 Z"
        fill="url(#zap-grad)"/>
  <!-- Corner dots -->
  <circle cx="148" cy="148" r="6" fill="#4F46E5" fill-opacity="0.5"/>
  <circle cx="364" cy="148" r="6" fill="#4F46E5" fill-opacity="0.5"/>
  <circle cx="148" cy="364" r="6" fill="#4F46E5" fill-opacity="0.5"/>
  <circle cx="364" cy="364" r="6" fill="#4F46E5" fill-opacity="0.5"/>
</svg>
